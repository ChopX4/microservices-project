syntax = "proto3";

package inventory.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/ChopX4/raketka/pkg/proto/inventory/v1;inventory_v1";

// gRPC-сервис, отвечающий за хранение и предоставление информации о деталях для сборки космических кораблей.
service InventoryService {
    // Возвращает информацию о детали по её UUID
    rpc GetPart(GetPartRequest) returns (GetPartResponse);
    // Возвращает список деталей с возможностью фильтрации
    rpc ListParts(ListPartsRequest) returns (ListPartsResponse);
}

message PartsFilter {
    repeated string uuids = 1;
    repeated string names = 2;
    repeated Category categories = 3;
    repeated string manufacturer_countries = 4;
    repeated string tags = 5;
}

message Value {
    oneof kind {
      string string_value = 1;
      int64 int64_value = 2;
      double double_value = 3;
      bool bool_value = 4;
    }
}

message Manufacturer {
    string name = 1;
    string country = 2;
    string website = 3;
}

message Dimensions {
    double length = 1;
    double width = 2;
    double height = 3;
    double weight = 4;
}

enum Category {
    UNKNOWN = 0; // Неизвестная категория
    ENGINE = 1; // Двигатель
    FUEL = 2; // Топливо
    PORTHOLE = 3; // Иллюминатор
    WING = 4; // Крыло
}

message Part {
    // Уникальный идентификатор детали
    string uuid = 1;
    // Название детали
    string name = 2;
    // Описание детали
    string description = 3;
    // Цена за единицу
    double price = 4;
    // Количество на складе
    int64 stock_quantity = 5;
    // Категория
    Category category = 6;
    // Размеры детали
    Dimensions dimensions = 7;
    // Информация о производителе
    Manufacturer manufacturer = 8;
    // Теги для быстрого поиска
    repeated string tags = 9;
    // Гибкие метаданные
    map<string, Value> metadata = 10;
    // Дата создания
    google.protobuf.Timestamp created_at = 11;
    // Дата обновления
    google.protobuf.Timestamp updated_at = 12;
}

message GetPartRequest {
    // идентификатор детали
    string uuid = 1;
}

message GetPartResponse {
    // информация о детали
    Part part = 1;
}

message ListPartsRequest {
    PartsFilter filter = 1;
}

message ListPartsResponse {
    repeated Part parts = 1;
}

