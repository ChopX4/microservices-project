parameters: 
  - $ref: ../params/order_uuid.yaml

post:
  summary: Makes payment for a previously created order
  operationId: OrderPay 
  tags: 
  - Order
  requestBody: 
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            payment_method:
              $ref: ../components/enums/payment_method.yaml
  responses:
    '200':
      description: Payment was successful
      content:
        application/json:
          schema:
            $ref: ../components/transaction_uuid.yaml
    '404':
      description: Order not found
      content:
        application/json:
          schema:
            $ref: ../components/errors/not_found_error.yaml
    '400':
        description: Bad request - validation error
        content:
          application/json:
            schema:
              $ref: ../components/errors/bad_request_error.yaml
    '409':
      description: Conflict - order cannot be paid in its current status
      content:
        application/json:
          schema:
            $ref: ../components/errors/conflict_error.yaml
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../components/errors/internal_server_error.yaml
    default:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: ../components/errors/generic_error.yaml
