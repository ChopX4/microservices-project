syntax = "proto3";

package events.v1;

option go_package = "github.com/ChopX4/raketka/pkg/proto/events/v1;events_v1";

// Входящее событие
message OrderPaid {
    string event_uuid = 1;
    string order_uuid = 2;
    string user_uuid = 3;
    string transaction_uuid = 4;
}

// Исходящие событие
message ShipAssembled {
    string event_uuid = 1;
    string order_uuid = 2;
    string user_uuid = 3;
    int64 build_time_sec = 4;
}