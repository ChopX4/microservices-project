syntax = "proto3";

package payment.v1;

option go_package = "github.com/ChopX4/raketka/pkg/proto/payment/v1;payment_v1";

// Сервис оплаты заказов симулирует работу платёжного шлюза
service PaymentService {
    //.
    rpc PayOrder(PayOrderRequest) returns (PayOrderResponse);
}

//  Перечисление: PaymentMethod
enum PaymentMethod {
    PAYMENT_METHOD_UNKNOWN_UNSPECIFIED = 0;
    PAYMENT_METHOD_CARD = 1;
    PAYMENT_METHOD_SPB = 2;
    PAYMENT_METHOD_CREDIT_CARD = 3;
    PAYMENT_METHOD_INVESTOR_MONEY = 4;
}

// Запрос
message PayOrderRequest {
    string order_uuid = 1;
    string user_uuid = 2;
    PaymentMethod payment_method = 3;
}

// Ответ
message PayOrderResponse {
    string transaction_uuid = 1;
}